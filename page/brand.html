<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPARK – Thương hiệu</title>
    <meta name="description" content="Khám phá các thương hiệu sneaker hàng đầu thế giới tại SPARK: Nike, Adidas, Converse, New Balance, Vans và nhiều hơn nữa.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/Header.css">
    <link rel="stylesheet" href="/css/footer.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); padding-top: 110px; }
        a { text-decoration: none; color: inherit; }

        /* ===== PAGE HERO ===== */
        .brand-hero {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 50%, #16213e 100%);
            padding: 80px 24px 100px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .brand-hero::before {
            content: '';
            position: absolute;
            top: -60px; left: 50%; transform: translateX(-50%);
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
        }
        .brand-hero::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #3b82f6, #8b5cf6, transparent);
        }
        .brand-hero-content { position: relative; z-index: 2; }
        .brand-hero-label {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #3b82f6;
            margin-bottom: 16px;
        }
        .brand-hero-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: clamp(48px, 8vw, 96px);
            font-weight: 900;
            line-height: 0.9;
            color: #fff;
            letter-spacing: -2px;
            margin-bottom: 20px;
        }
        .brand-hero-title span { color: #facc15; }
        .brand-hero-sub {
            font-size: 16px;
            color: rgba(255,255,255,0.6);
            max-width: 480px;
            margin: 0 auto;
        }

        /* ===== BRAND SEARCH BAR ===== */
        .brand-search-wrap {
            max-width: 520px;
            margin: 32px auto 0;
        }
        .brand-search {
            display: flex;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        .brand-search input {
            flex: 1;
            padding: 14px 20px;
            background: transparent;
            border: none;
            outline: none;
            font-size: 14px;
            font-family: inherit;
            color: #fff;
        }
        .brand-search input::placeholder { color: rgba(255,255,255,0.4); }
        .brand-search button {
            padding: 14px 24px;
            background: #3b82f6;
            border: none;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background .2s;
            border-radius: 0 50px 50px 0;
        }
        .brand-search button:hover { background: #2563eb; }

        /* ===== STATS BAR ===== */
        .stats-bar {
            background: var(--card);
            border-bottom: 1px solid var(--border);
        }
        .stats-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 24px;
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        .stat-item {
            text-align: center;
        }
        .stat-num {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 28px;
            font-weight: 900;
            color: var(--text);
        }
        .stat-label {
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ===== FILTER TABS ===== */
        .filter-wrap {
            max-width: 1200px;
            margin: 40px auto 0;
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .filter-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .filter-chip {
            padding: 8px 18px;
            border-radius: 24px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
        }
        .filter-chip:hover { border-color: var(--text); }
        .filter-chip.active { background: var(--text); color: var(--bg); border-color: var(--text); }

        /* ===== BRAND GRID ===== */
        .brands-section {
            max-width: 1200px;
            margin: 32px auto 60px;
            padding: 0 24px;
        }
        .brands-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        /* ===== BRAND CARD ===== */
        .brand-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform .25s, box-shadow .25s, border-color .25s;
            position: relative;
        }
        .brand-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            border-color: var(--muted);
        }
        html.dark .brand-card:hover {
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .brand-card-banner {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .brand-card-banner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.3));
        }
        .brand-logo-text {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 42px;
            font-weight: 900;
            letter-spacing: -1px;
            color: #fff;
            text-shadow: 0 2px 12px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }
        .brand-card-body {
            padding: 18px 20px 20px;
        }
        .brand-card-name {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -0.5px;
            color: var(--text);
            margin-bottom: 6px;
        }
        .brand-card-desc {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.5;
            margin-bottom: 14px;
        }
        .brand-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .brand-product-count {
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            letter-spacing: .5px;
        }
        .brand-product-count strong {
            color: var(--text);
            font-size: 15px;
        }
        .brand-view-btn {
            padding: 7px 16px;
            background: var(--text);
            color: var(--bg);
            border: none;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity .2s;
        }
        .brand-view-btn:hover { opacity: .8; }

        /* NEW badge */
        .brand-new-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #ef4444;
            color: #fff;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 1px;
            padding: 3px 8px;
            border-radius: 4px;
            z-index: 2;
        }

        /* ===== FEATURED SECTION ===== */
        .featured-section {
            background: var(--card);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            padding: 60px 24px;
            text-align: center;
            margin-bottom: 60px;
        }
        .featured-inner {
            max-width: 900px;
            margin: 0 auto;
        }
        .featured-label {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #3b82f6;
            margin-bottom: 12px;
        }
        .featured-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 48px;
            font-weight: 900;
            color: var(--text);
            letter-spacing: -1px;
            margin-bottom: 12px;
        }
        .featured-sub {
            font-size: 15px;
            color: var(--muted);
            margin-bottom: 36px;
        }
        .featured-logos {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 32px;
            flex-wrap: wrap;
        }
        .featured-logo-item {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 24px;
            font-weight: 900;
            color: var(--muted);
            letter-spacing: -0.5px;
            transition: color .2s;
            cursor: pointer;
        }
        .featured-logo-item:hover { color: var(--text); }

        /* ===== NO RESULTS ===== */
        .no-brands {
            grid-column: 1/-1;
            text-align: center;
            padding: 60px;
            color: var(--muted);
            font-size: 15px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .brand-hero { padding: 60px 20px 80px; }
            .brands-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
            .stats-inner { gap: 24px; }
        }
        @media (max-width: 480px) {
            .brands-grid { grid-template-columns: 1fr 1fr; }
            .brand-card-desc { display: none; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<div id="header"></div>

<!-- HERO -->
<section class="brand-hero">
    <div class="brand-hero-content">
        <div class="brand-hero-label">Thương hiệu</div>
        <h1 class="brand-hero-title">NHỮNG<br>THƯƠNG<br>HIỆU <span>ĐỈNH</span></h1>
        <p class="brand-hero-sub">Tất cả các thương hiệu sneaker hàng đầu thế giới — chính hãng 100%</p>
        <div class="brand-search-wrap">
            <div class="brand-search">
                <input type="text" id="brandSearchInput" placeholder="Tìm thương hiệu..." oninput="filterBrands(this.value)">
                <button onclick="filterBrands(document.getElementById('brandSearchInput').value)">Tìm</button>
            </div>
        </div>
    </div>
</section>

<!-- STATS -->
<div class="stats-bar">
    <div class="stats-inner">
        <div class="stat-item">
            <div class="stat-num" id="totalBrandsNum">12</div>
            <div class="stat-label">Thương hiệu</div>
        </div>
        <div class="stat-item">
            <div class="stat-num" id="totalProductsNum">500+</div>
            <div class="stat-label">Sản phẩm</div>
        </div>
        <div class="stat-item">
            <div class="stat-num">100%</div>
            <div class="stat-label">Hàng chính hãng</div>
        </div>
        <div class="stat-item">
            <div class="stat-num">30</div>
            <div class="stat-label">Ngày đổi trả</div>
        </div>
    </div>
</div>

<!-- FILTER TABS -->
<div class="filter-wrap">
    <span class="filter-label">Lọc:</span>
    <button class="filter-chip active" onclick="setFilter('all', this)">Tất cả</button>
    <button class="filter-chip" onclick="setFilter('sport', this)">Thể thao</button>
    <button class="filter-chip" onclick="setFilter('street', this)">Streetwear</button>
    <button class="filter-chip" onclick="setFilter('classic', this)">Classic</button>
    <button class="filter-chip" onclick="setFilter('luxury', this)">Luxury</button>
</div>

<!-- BRANDS GRID -->
<section class="brands-section">
    <div class="brands-grid" id="brandsGrid">
        <!-- Rendered by JS -->
    </div>
</section>

<!-- FEATURED LOGOS STRIP -->
<section class="featured-section">
    <div class="featured-inner">
        <div class="featured-label">Đối tác chính thức</div>
        <div class="featured-title">CHÍNH HÃNG TOÀN BỘ</div>
        <p class="featured-sub">Chúng tôi là đối tác phân phối chính thức của tất cả các thương hiệu</p>
        <div class="featured-logos" id="allLogos"></div>
    </div>
</section>

<!-- FOOTER -->
<div id="footer"></div>

<script src="/js/layout.js"></script>
<script>
    // ====== BRAND DATA ======
    const BRANDS = [
        {
            id: 'nike',
            name: 'Nike',
            tagline: 'Just Do It',
            desc: 'Thương hiệu thể thao số 1 thế giới. Đổi mới không ngừng từ Air Max đến Air Force 1.',
            color: '#ff6b35',
            gradient: 'linear-gradient(135deg, #ff6b35, #f5113c)',
            category: ['sport', 'street'],
            products: 0,
            isNew: false
        },
        {
            id: 'adidas',
            name: 'Adidas',
            tagline: 'Impossible Is Nothing',
            desc: 'Công nghệ Boost và thiết kế Three Stripes huyền thoại từ Đức.',
            color: '#000',
            gradient: 'linear-gradient(135deg, #1a1a1a, #333)',
            category: ['sport', 'street'],
            products: 0,
            isNew: false
        },
        {
            id: 'converse',
            name: 'Converse',
            tagline: 'Shoes Are Boring. Wear Sneakers.',
            desc: 'Chuck Taylor All Star – biểu tượng thời trang từ 1917 không bao giờ lỗi mốt.',
            color: '#cc0000',
            gradient: 'linear-gradient(135deg, #cc0000, #ff4444)',
            category: ['classic', 'street'],
            products: 0,
            isNew: false
        },
        {
            id: 'new-balance',
            name: 'New Balance',
            tagline: 'Fearlessly Independent',
            desc: 'Comfort và style hoàn hảo. Từ 574 đến 990 đều là những kiệt tác.',
            color: '#cf3339',
            gradient: 'linear-gradient(135deg, #1c4ed8, #1d4ed8)',
            category: ['sport', 'classic'],
            products: 0,
            isNew: false
        },
        {
            id: 'vans',
            name: 'Vans',
            tagline: 'Off The Wall',
            desc: 'Linh hồn của skateboarding. Old Skool, Sk8-Hi và Slip-On là những icon bất hủ.',
            color: '#1a1a1a',
            gradient: 'linear-gradient(135deg, #1a1a1a, #444)',
            category: ['street', 'classic'],
            products: 0,
            isNew: false
        },
        {
            id: 'puma',
            name: 'Puma',
            tagline: 'Forever Faster',
            desc: 'Tốc độ và phong cách. Suede, Clyde và RS-X là những mẫu thiết kế tiêu biểu.',
            color: '#e4003a',
            gradient: 'linear-gradient(135deg, #e4003a, #ff6b9d)',
            category: ['sport', 'street'],
            products: 0,
            isNew: false
        },
        {
            id: 'jordan',
            name: 'Jordan',
            tagline: 'Be Like Mike',
            desc: 'Huyền thoại từ sân bóng rổ NBA. Air Jordan 1, 3, 4, 11 đều là những kiệt tác.',
            color: '#dc2626',
            gradient: 'linear-gradient(135deg, #dc2626, #991b1b)',
            category: ['sport', 'street'],
            products: 0,
            isNew: false
        },
        {
            id: 'reebok',
            name: 'Reebok',
            tagline: 'Always Classic',
            desc: 'Classic Leather và Club C 85 – sự tối giản đỉnh cao với chất lượng vượt thời gian.',
            color: '#c8102e',
            gradient: 'linear-gradient(135deg, #c8102e, #1a1a1a)',
            category: ['sport', 'classic'],
            products: 0,
            isNew: false
        },
        {
            id: 'asics',
            name: 'ASICS',
            tagline: 'Sound Mind, Sound Body',
            desc: 'Gel-Kayano và Nimbus – vua của giày chạy bộ chuyên nghiệp Nhật Bản.',
            color: '#1a1aff',
            gradient: 'linear-gradient(135deg, #1a1aff, #4444ff)',
            category: ['sport'],
            products: 0,
            isNew: true
        },
        {
            id: 'salomon',
            name: 'Salomon',
            tagline: 'Time To Play',
            desc: 'Từ trail running đến streetwear. XT-6 và Speedcross là những mẫu siêu hot.',
            color: '#ff6a00',
            gradient: 'linear-gradient(135deg, #ff6a00, #ee0979)',
            category: ['sport', 'street'],
            products: 0,
            isNew: true
        },
        {
            id: 'hoka',
            name: 'HOKA',
            tagline: 'Fly Human Fly',
            desc: 'Thiết kế độc đáo oversized với đệm tối ưu, định nghĩa lại thoải mái khi chạy.',
            color: '#f97316',
            gradient: 'linear-gradient(135deg, #f97316, #fbbf24)',
            category: ['sport'],
            products: 0,
            isNew: true
        },
        {
            id: 'on-running',
            name: 'On Running',
            tagline: 'Run On Clouds',
            desc: 'Công nghệ CloudTec từ Thụy Sĩ. Cảm giác chạy như trên mây thực sự.',
            color: '#10b981',
            gradient: 'linear-gradient(135deg, #10b981, #059669)',
            category: ['sport', 'luxury'],
            products: 0,
            isNew: true
        }
    ];

    let currentFilter = 'all';
    let productCounts = {};

    // Load product counts from API
    async function loadProductCounts() {
        try {
            const res = await fetch('/api/products');
            if (!res.ok) return;
            const products = await res.json();
            products.forEach(p => {
                const brand = (p.Brand || p.brand || '').toLowerCase().replace(/\s+/g, '-');
                productCounts[brand] = (productCounts[brand] || 0) + 1;
            });

            // Update brand products
            BRANDS.forEach(b => {
                b.products = productCounts[b.id] || productCounts[b.name.toLowerCase()] || 0;
            });

            const total = products.length;
            document.getElementById('totalProductsNum').textContent = total + '+';
            document.getElementById('totalBrandsNum').textContent = BRANDS.length;
        } catch {}
        renderBrands(BRANDS.filter(b => currentFilter === 'all' || b.category.includes(currentFilter)));
    }

    function renderBrands(list) {
        const grid = document.getElementById('brandsGrid');
        if (!list.length) {
            grid.innerHTML = '<div class="no-brands">Không tìm thấy thương hiệu nào 🤷</div>';
            return;
        }
        grid.innerHTML = list.map(b => `
<div class="brand-card" onclick="goToBrand('${b.name}')" id="bc-${b.id}">
    ${b.isNew ? '<span class="brand-new-badge">NEW</span>' : ''}
    <div class="brand-card-banner" style="background:${b.gradient}">
        <div class="brand-logo-text">${b.name.toUpperCase()}</div>
    </div>
    <div class="brand-card-body">
        <div class="brand-card-name">${b.name}</div>
        <div class="brand-card-desc">${b.desc}</div>
        <div class="brand-card-footer">
            <div class="brand-product-count">
                <strong>${b.products || '—'}</strong> sản phẩm
            </div>
            <button class="brand-view-btn" onclick="event.stopPropagation(); goToBrand('${b.name}')">
                Xem ngay →
            </button>
        </div>
    </div>
</div>`).join('');

        // Render logo strip
        document.getElementById('allLogos').innerHTML = BRANDS.map(b =>
            `<div class="featured-logo-item" onclick="goToBrand('${b.name}')">${b.name}</div>`
        ).join('');
    }

    function goToBrand(brandName) {
        location.href = `/page/products.html?brand=${encodeURIComponent(brandName)}`;
    }

    function setFilter(cat, el) {
        currentFilter = cat;
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        const q = document.getElementById('brandSearchInput').value.toLowerCase();
        applyFilters(q, cat);
    }

    function filterBrands(query) {
        applyFilters(query.toLowerCase(), currentFilter);
    }

    function applyFilters(query, cat) {
        const filtered = BRANDS.filter(b => {
            const matchCat = cat === 'all' || b.category.includes(cat);
            const matchQ = !query || b.name.toLowerCase().includes(query) || b.desc.toLowerCase().includes(query);
            return matchCat && matchQ;
        });
        renderBrands(filtered);
    }

    // Init
    renderBrands(BRANDS);
    loadProductCounts();
</script>
</body>
</html>

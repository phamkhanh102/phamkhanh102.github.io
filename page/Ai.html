<!DOCTYPE html>
<html>
<head>
    <title> Sneaker Chat</title>
    <link rel="stylesheet" href="/css/site.css">
    <link rel="stylesheet" href="/css/SanPham.css" />
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/IconLogin.css">
    <link rel="stylesheet" href="/css/Header.css">
    <link rel="stylesheet" href="/css/menu.css">
    <link rel="stylesheet" href="/css/AI.css" />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;800&display=swap" rel="stylesheet">
    <style>

      
        /* ===== SIDEBAR ===== */
        .sidebar {
            position: fixed;
            top: 0;
            left: -260px;
            width: 260px;
            height: 100%;
            background: var(--panel);
            box-shadow: 6px 0 20px rgba(0,0,0,.5);
            padding-top: 80px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: .35s;
            z-index: 1002;
        }

            .sidebar a {
                color: var(--text);
                text-decoration: none;
                padding: 14px 26px;
                font-size: 16px;
                transition: .2s;
            }

                .sidebar a:hover {
                    background: #0f172a;
                    color: #3b82f6;
                }

            .sidebar.show {
                left: 0;
            }
        /* MAIN BOX */

        .chat-box {
            width: 460px;
            height: 720px;
            backdrop-filter: blur(20px);
            background: rgba(15,23,42,.7);
            border: 1px solid rgba(255,255,255,.05);
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 0 20px 80px rgba(0,0,0,.6);
        }

        /* HEADER */

        .header {
            font-size: 20px;
            font-weight: 700;
            color: white;
            margin-bottom: 10px;
        }

        /* MESSAGE AREA */

        .messages {
            flex: 1;
            overflow: auto;
            padding-right: 5px;
        }

        /* BUBBLES */

        .user {
            align-self: flex-end;
            background: linear-gradient(135deg,#3b82f6,#2563eb);
            color: white;
            padding: 12px 16px;
            border-radius: 16px 16px 4px 16px;
            margin: 6px 0;
            max-width: 75%;
        }

        .bot {
            align-self: flex-start;
            background: #020617;
            border: 1px solid rgba(255,255,255,.05);
            color: white;
            padding: 12px 16px;
            border-radius: 16px 16px 16px 4px;
            margin: 6px 0;
            max-width: 85%;
        }

        /* INPUT */

        .row {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 14px;
            border-radius: 14px;
            border: none;
            outline: none;
            background: #020617;
            color: white;
        }

        button {
            padding: 14px 20px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg,#22c55e,#16a34a);
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        /* PRODUCT CARD */

        .card {
            margin-top: 10px;
            padding: 14px;
            border-radius: 18px;
            background: linear-gradient(145deg,#020617,#0f172a);
            border: 1px solid rgba(255,255,255,.05);
            transition: .25s;
        }

            .card:hover {
                transform: translateY(-4px);
                box-shadow: 0 10px 30px rgba(0,0,0,.5);
            }

        .price {
            color: #22c55e;
            font-weight: 700;
        }

        /* SCROLLBAR */

        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <header class="header">

        <div class="container header-row">

            <div class="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <a href="shop.html" class="logo">
                SneakerShop
            </a>

            <div class="search search-box">
                <input id="q" placeholder="Tìm giày...">
                <button onclick="applyFilters()">Tìm</button>
                <div id="suggestions" class="suggestions"></div>
            </div>

            <div class="header-actions">

                <div class="account">

                    <div class="account-btn" onclick="toggleAccount()">
                        👤
                    </div>

                    <div class="account-menu" id="accountMenu">

                        <a href="account.html">Tài khoản</a>
                        <a href="orders.html">Đơn hàng</a>
                        <a href="wishlist.html">Yêu thích</a>
                        <a href="#" onclick="logout()">Đăng xuất</a>

                    </div>

                </div>

                <button class="theme-btn" onclick="toggleTheme()">
                    🌙
                </button>

                <a href="cart.html" class="cart-btn">
                    🛒 <span id="cartCount">0</span>
                </a>

                <a href="checkout.html" class="checkout-btn">
                    Thanh toán
                </a>

            </div>

        </div>

    </header>

    <div class="chat-box">

        <div class="header">
            AI Sneaker Assistant
        </div>

        <div class="messages" id="messages"></div>

        <div class="row">
            <input id="msg" placeholder="Hỏi về giày Nike, Adidas..." />
            <button onclick="send()">Gửi</button>
        </div>

    </div>

    <script>

        document.getElementById("msg")
            .addEventListener("keypress", function (e) {
                if (e.key === "Enter") send();
            });

        async function send() {

            const input = document.getElementById("msg");
            const text = input.value;

            if (!text) return;

            const messages = document.getElementById("messages");

            // USER
            const user = document.createElement("div");
            user.className = "user";
            user.innerText = text;
            messages.appendChild(user);

            input.value = "";

            // TYPING
            const typing = document.createElement("div");
            typing.className = "bot";
            typing.innerText = "AI đang suy nghĩ...";
            messages.appendChild(typing);

            messages.scrollTop = messages.scrollHeight;

            //--------------------------------
            // CALL API
            //--------------------------------

            const res = await fetch("/api/chat", {
                method: "POST",
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(text)
            });

            const data = await res.json();

            typing.remove();

            const bot = document.createElement("div");
            bot.className = "bot";

            //--------------------------------
            // TEXT
            //--------------------------------

            if (data.type === "text") {
                bot.innerText = data.message;
            }

            //--------------------------------
            // PRODUCT
            //--------------------------------

            if (data.type === "products") {

                bot.innerHTML = data.data.map(p => `

                            <div class="card">
                                <b>${p.name}</b>
                                <p>${p.brand}</p>

                                <p class="price">
                                     ${p.price.toLocaleString()} VND
                                </p>

                                <p> Còn ${p.stock}</p>
                            </div>

                        `).join("");
            }

            messages.appendChild(bot);
            messages.scrollTop = messages.scrollHeight;
        }

    </script>
    <script src="js/Header.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/Account.js"></script>
    <script src="js/AI.js"></script>
</body>

</html>
